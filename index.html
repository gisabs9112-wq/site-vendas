<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja Online</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f8f8f8;
      color: #333;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      font-size: 28px;
    }

    .banner {
      background: url('https://images.unsplash.com/photo-1521335629791-ce4aec67dd53') no-repeat center/cover;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .banner h2 {
      font-size: 40px;
      background: rgba(0,0,0,0.5);
      padding: 20px;
      border-radius: 10px;
    }

    .produtos {
      padding: 40px;
      text-align: center;
    }

    .produtos h2 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card h3 {
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #ff6600;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #e65c00;
    }

    .contato {
      background: #222;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .contato a {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      border-radius: 5px;
      text-decoration: none;
      color: white;
    }

    .whatsapp {
      background: #25D366;
    }

    .instagram {
      background: #E1306C;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #111;
      color: white;
    }

    .floating {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .floating a {
      padding: 15px;
      border-radius: 50%;
      color: white;
      text-align: center;
      font-size: 18px;
    }

    .floating .whatsapp {
      background: #25D366;
    }

    .floating .instagram {
      background: #E1306C;
    }
  </style>
</head>

<body>

<header>
  <h1>Sua Loja Online</h1>
</header>

<section class="banner">
  <h2>Produtos Incríveis Para Você</h2>
</section>

<section class="produtos">
  <h2>Nossos Produtos</h2>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
      <h3>Produto 1</h3>
      <p>Descrição do produto</p>
      <a href="#" class="btn">Comprar</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f">
      <h3>Produto 2</h3>
      <p>Descrição do produto</p>
      <a href="#" class="btn">Comprar</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e">
      <h3>Produto 3</h3>
      <p>Descrição do produto</p>
      <a href="#" class="btn">Comprar</a>
    </div>

  </div>
</section>

<section class="contato">
  <h2>Fale Conosco</h2>

  <a href="https://wa.me/5554991674077" target="_blank" class="whatsapp">
    WhatsApp
  </a>

  <a href="https://instagram.com/arcondicionado_solumartin" target="_blank" class="instagram">
    Instagram
  </a>

</section>

<footer>
  <p>© 2026 - Sua Empresa</p>
</footer>

<div class="floating">
  <a href="https://wa.me/5554991674077" target="_blank" class="whatsapp">W</a>
  <a href="https://instagram.com/arcondicionado_solumartin" target="_blank" class="instagram">I</a>
</div>

</body>
</html>
