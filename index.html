<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1e1b4b, #020617);
  color: white;
  scroll-behavior: smooth;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 15px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* SECTION */
section {
  padding: 100px 20px;
  text-align: center;
}

/* LOGO */
.logo {
  max-width: 320px;
  filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
}

/* HERO */
.hero {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.hero img {
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  transition: 0.4s;
  width: 100%;
  max-width: 300px;
}

.hero img:hover {
  transform: scale(1.05);
}

.big {
  max-width: 420px;
}

.rotate-left {
  transform: rotate(-5deg);
}

.rotate-right {
  transform: rotate(5deg);
}

/* BOTÃO */
.btn {
  background: linear-gradient(45deg, #f472b6, #facc15);
  padding: 14px 25px;
  border-radius: 12px;
  color: black;
  font-weight: bold;
  text-decoration: none;
  display: inline-block;
  margin-top: 15px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.08);
}

/* KITS */
.kits {
  display: flex;
  gap: 25px;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: rgba(255,255,255,0.95);
  color: black;
  border-radius: 15px;
  padding: 15px;
  width: 260px;
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 100%;
  border-radius: 12px;
}

/* GALERIA */
.galeria {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
  margin-top: 30px;
}

.galeria img {
  width: 100%;
  border-radius: 10px;
  transition: 0.3s;
}

.galeria img:hover {
  transform: scale(1.05);
}

/* CONTATO FINAL */
.contato {
  margin-top: 40px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: center;
  font-size: 18px;
}

/* BOTÕES FLUTUANTES */
.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 24px;
}

.instagram-float {
  position: fixed;
  bottom: 85px;
  right: 20px;
  background: #E1306C;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 24px;
}

/* MOBILE */
@media (max-width:768px){

.hero {
  flex-direction: column;
}

.rotate-left,
.rotate-right {
  transform: rotate(0);
}

.kits {
  flex-direction: column;
}

.card {
  width: 90%;
}

}

</style>
</head>
