<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1e1b4b, #020617);
  color: white;
  scroll-behavior: smooth;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 15px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* SECTION */
section {
  padding: 100px 20px;
  text-align: center;
}

/* LOGO */
.logo {
  max-width: 320px;
  filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
}

/* HERO */
.hero {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.hero img {
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  width: 100%;
  max-width: 300px;
  transition: 0.4s;
}

.hero img:hover {
  transform: scale(1.05);
}

.big {
  max-width: 420px;
}

.rotate-left { transform: rotate(-5deg); }
.rotate-right { transform: rotate(5deg); }

/* BOTÃO */
.btn {
  background: linear-gradient(45deg, #f472b6, #facc15);
  padding: 14px 25px;
  border-radius: 12px;
  color: black;
  font-weight: bold;
  text-decoration: none;
  display: inline-block;
  margin-top: 15px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.08);
}

/* KITS */
.kits {
  display: flex;
  gap: 25px;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: rgba(255,255,255,0.95);
  color: black;
  border-radius: 15px;
  padding: 15px;
  width: 260px;
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 100%;
  border-radius: 12px;
}

/* GALERIA */
.galeria {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
  margin-top: 30px;
}

.galeria img {
  width: 100%;
  border-radius: 10px;
  transition: 0.3s;
}

.galeria img:hover {
  transform: scale(1.05);
}

/* CONTATO FINAL */
.contato {
  margin-top: 50px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  align-items: center;
  font-size: 18px;
}

.contato-box {
  background: rgba(255,255,255,0.1);
  padding: 10px 20px;
  border-radius: 10px;
}

/* BOTÕES FLUTUANTES */
.whatsapp-float,
.instagram-float {
  position: fixed;
  right: 20px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 28px;
  z-index: 9999;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

.whatsapp-float {
  bottom: 20px;
  background: #25D366;
}

.instagram-float {
  bottom: 90px;
  background: linear-gradient(45deg, #E1306C, #F77737);
}

.whatsapp-float:hover,
.instagram-float:hover {
  transform: scale(1.1);
}

/* MOBILE */
@media (max-width:768px){
.hero { flex-direction: column; }
.rotate-left, .rotate-right { transform: rotate(0); }
.kits { flex-direction: column; }
.card { width: 90%; }
}

</style>
</head>
