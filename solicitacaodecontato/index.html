<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato - Brilhe Festa</title>

<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1e1b4b, #020617);
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
}

.logo {
  max-width: 250px;
  margin-bottom: 20px;
}

h2 {
  margin-bottom: 25px;
}

/* BOTÕES */
.btn {
  display: block;
  width: 260px;
  margin: 15px auto;
  padding: 15px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  color: white;
  transition: 0.3s;
}

/* WHATSAPP */
.whatsapp {
  background: #25D366;
}

.whatsapp:hover {
  background: #1ebe5d;
  transform: scale(1.05);
}

/* INSTAGRAM */
.instagram {
  background: linear-gradient(45deg, #E1306C, #F77737);
}

.instagram:hover {
  transform: scale(1.05);
}

/* VOLTAR */
.voltar {
  margin-top: 30px;
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #f472b6, #facc15);
  color: black;
  font-weight: bold;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="../brilhe festa logo sem fundo.png" class="logo">

  <h2>Escolha como deseja entrar em contato</h2>

  <!-- WHATSAPP -->
  <a href="https://wa.me/5554984053314?text=Olá! Quero fazer uma reserva." target="_blank" class="btn whatsapp">
    📱 Falar no WhatsApp
  </a>

  <!-- INSTAGRAM -->
  <a href="https://www.instagram.com/brilhe_festa/" target="_blank" class="btn instagram">
    📸 Ver Instagram
  </a>

  <!-- VOLTAR -->
  <button class="voltar" onclick="window.location.href='../index.html'">
    Voltar ao site
  </button>

</div>

</body>
</html>
